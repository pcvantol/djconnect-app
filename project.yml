name: DJConnectApp
options:
  bundleIdPrefix: dev
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "3.2.2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  DJConnectCoreIOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DJConnectCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.core.ios
        PRODUCT_NAME: DJConnectCore
        PRODUCT_MODULE_NAME: DJConnectCore
        GENERATE_INFOPLIST_FILE: YES
  DJConnectCoreMac:
    type: framework
    platform: macOS
    sources:
      - path: Sources/DJConnectCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.core.mac
        PRODUCT_NAME: DJConnectCore
        PRODUCT_MODULE_NAME: DJConnectCore
        GENERATE_INFOPLIST_FILE: YES
  DJConnectCoreWatch:
    type: framework.static
    platform: watchOS
    sources:
      - path: Sources/DJConnectCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.core.watch
        PRODUCT_NAME: DJConnectCore
        PRODUCT_MODULE_NAME: DJConnectCore
        GENERATE_INFOPLIST_FILE: YES
  DJConnectUIIOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources/DJConnectUI
    dependencies:
      - target: DJConnectCoreIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.ui.ios
        PRODUCT_NAME: DJConnectUI
        PRODUCT_MODULE_NAME: DJConnectUI
        GENERATE_INFOPLIST_FILE: YES
  DJConnectUIMac:
    type: framework
    platform: macOS
    sources:
      - path: Sources/DJConnectUI
    dependencies:
      - target: DJConnectCoreMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.ui.mac
        PRODUCT_NAME: DJConnectUI
        PRODUCT_MODULE_NAME: DJConnectUI
        GENERATE_INFOPLIST_FILE: YES
  DJConnectIOS:
    type: application
    platform: iOS
    sources:
      - path: Apps/DJConnectIOS
      - path: Apps/Shared/Assets.xcassets
    dependencies:
      - target: DJConnectCoreIOS
      - target: DJConnectUIIOS
      - target: DJConnectTrackInsightWidgetsIOS
        embed: true
    info:
      path: Apps/DJConnectIOS/Info.plist
      properties:
        CFBundleDisplayName: DJConnect
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.music
        UILaunchStoryboardName: LaunchScreen
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeMessage
            UIApplicationShortcutItemTitle: Ask DJ
            UIApplicationShortcutItemType: dev.djconnect.action.ask-dj
          - UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAudio
            UIApplicationShortcutItemSubtitle: Analyseer huidig nummer
            UIApplicationShortcutItemTitle: Track Insight
            UIApplicationShortcutItemType: dev.djconnect.action.track-insight
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: DJConnect maakt verbinding met Home Assistant op je lokale netwerk.
        NSMicrophoneUsageDescription: DJConnect neemt je stem op voor push-to-talk muziekverzoeken aan Home Assistant.
        NSSpeechRecognitionUsageDescription: DJConnect gebruikt spraakherkenning om de wake-zin te herkennen.
        NSSupportsLiveActivities: true
        UIRequiredDeviceCapabilities:
          - wifi
        NSBonjourServices:
          - _home-assistant._tcp.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.ios
        PRODUCT_NAME: DJConnect
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Apps/DJConnectIOS/DJConnectIOS.entitlements
  DJConnectMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/DJConnectMac
      - path: Apps/Shared/Assets.xcassets
    dependencies:
      - target: DJConnectCoreMac
      - target: DJConnectUIMac
      - target: DJConnectTrackInsightWidgetsMac
        embed: true
    info:
      path: Apps/DJConnectMac/Info.plist
      properties:
        CFBundleDisplayName: DJConnect
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.music
        NSLocalNetworkUsageDescription: DJConnect maakt verbinding met Home Assistant op je lokale netwerk.
        NSMicrophoneUsageDescription: DJConnect neemt je stem op voor push-to-talk muziekverzoeken aan Home Assistant.
        NSSpeechRecognitionUsageDescription: DJConnect gebruikt spraakherkenning om de wake-zin te herkennen.
        NSBonjourServices:
          - _home-assistant._tcp.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.mac
        PRODUCT_NAME: DJConnect
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Apps/DJConnectMac/DJConnectMac.entitlements
        ENABLE_HARDENED_RUNTIME: YES
  DJConnectWatch:
    type: application
    platform: watchOS
    sources:
      - path: Apps/DJConnectWatch
      - path: Apps/Shared/Assets.xcassets
    dependencies:
      - target: DJConnectCoreWatch
      - target: DJConnectWatchComplications
        embed: true
    info:
      path: Apps/DJConnectWatch/Info.plist
      properties:
        CFBundleDisplayName: DJConnect
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKWatchOnly: false
        NSLocalNetworkUsageDescription: DJConnect maakt verbinding met Home Assistant op je lokale netwerk.
        NSMicrophoneUsageDescription: DJConnect neemt je stem op voor push-to-talk muziekverzoeken aan Home Assistant.
        NSSpeechRecognitionUsageDescription: DJConnect gebruikt spraakherkenning alleen voor foreground stemactivatie met Hey DJ.
        UIRequiredDeviceCapabilities:
          - wifi
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.watch
        PRODUCT_NAME: DJConnect
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Apps/DJConnectWatch/DJConnectWatch.entitlements
  DJConnectWatchComplications:
    type: app-extension
    platform: watchOS
    sources:
      - path: Apps/DJConnectWatchComplications
    info:
      path: Apps/DJConnectWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: DJConnect
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.watch.complications
        PRODUCT_NAME: DJConnectComplications
        SKIP_INSTALL: YES
  DJConnectTrackInsightWidgetsIOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Apps/DJConnectTrackInsightWidgets
    dependencies:
      - target: DJConnectCoreIOS
    info:
      path: Apps/DJConnectTrackInsightWidgets/Info.plist
      properties:
        CFBundleDisplayName: Track Insight
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.ios.track-insight-widget
        PRODUCT_NAME: TrackInsightWidget
        CODE_SIGN_ENTITLEMENTS: Apps/DJConnectTrackInsightWidgets/DJConnectTrackInsightWidgets.entitlements
        SKIP_INSTALL: YES
  DJConnectTrackInsightWidgetsMac:
    type: app-extension
    platform: macOS
    sources:
      - path: Apps/DJConnectTrackInsightWidgets
    dependencies:
      - target: DJConnectCoreMac
    info:
      path: Apps/DJConnectTrackInsightWidgets/Info.plist
      properties:
        CFBundleDisplayName: Track Insight
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.mac.track-insight-widget
        PRODUCT_NAME: TrackInsightWidget
        CODE_SIGN_ENTITLEMENTS: Apps/DJConnectTrackInsightWidgets/DJConnectTrackInsightWidgets.entitlements
        SKIP_INSTALL: YES
  DJConnectCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/DJConnectCoreTests
    dependencies:
      - target: DJConnectCoreMac
      - target: DJConnectUIMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.core.tests
        GENERATE_INFOPLIST_FILE: YES
  DJConnectIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/DJConnectIOSUITests
    dependencies:
      - target: DJConnectIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
  DJConnectMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/DJConnectMacUITests
    dependencies:
      - target: DJConnectMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.djconnect.mac.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DJConnectIOS:
    build:
      targets:
        DJConnectIOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DJConnectIOSUITests
    profile:
      config: Release
    archive:
      config: Release
  DJConnectMac:
    build:
      targets:
        DJConnectMac: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DJConnectCoreTests
        - DJConnectMacUITests
    profile:
      config: Release
    archive:
      config: Release
  DJConnectWatch:
    build:
      targets:
        DJConnectWatch: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
