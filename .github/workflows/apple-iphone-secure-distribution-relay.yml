name: Apple iPhone Secure Distribution Relay

on:
  workflow_dispatch:
    inputs:
      candidate_sha: {required: true, type: string}
      manifest_id: {required: true, type: string}
      artifact_id: {required: true, type: string}
      artifact_sha256: {required: true, type: string}
      platform_version: {required: true, type: string}
      release_profile: {required: true, type: choice, options: [INTERNAL_RELEASE]}

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64, internal-release]
    environment: apple-secure-distribution
    env:
      IPHONE_UDID: ${{ secrets.DJCONNECT_APPLE_IPHONE_UDID }}
      WATCH_UDID: ${{ secrets.DJCONNECT_APPLE_WATCH_UDID }}
      SIGNING_IDENTITY: ${{ secrets.DJCONNECT_APPLE_DEVELOPMENT_SIGNING_IDENTITY }}
    steps:
      - id: validate
        name: Validate immutable iPhone request and approved manifest binding
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          set -euo pipefail
          test "$RELEASE_PROFILE" = INTERNAL_RELEASE
          printf '%s' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$ARTIFACT_ID" | grep -Eq '^release-asset:pcvantol/djconnect-app-releases:ios/v[0-9]+\.[0-9]+\.[0-9]+:DJConnect-iOS-[0-9]+\.[0-9]+\.[0-9]+-unsigned\.zip$'
          printf '%s' "$ARTIFACT_SHA256" | grep -Eq '^[0-9a-f]{64}$'
          printf '%s' "$PLATFORM_VERSION" | grep -Eq '^[0-9]+\.[0-9]+$'
          manifest="$(mktemp)"
          trap 'rm -f "$manifest"' EXIT
          curl --fail --silent --show-error --location https://raw.githubusercontent.com/pcvantol/djconnect/main/docs/release/PLATFORM_3_3_CURRENT_MAIN_MANIFEST_PROPOSAL.json --output "$manifest"
          test "$(jq -r '.status' "$manifest")" = APPROVED_DEPLOYMENT_DISPATCH_PENDING
          test "$(jq -r '.approval.state' "$manifest")" = APPROVED
          test "$(jq -r '.manifest_id' "$manifest")" = "$MANIFEST_ID"
          test "$(jq -r '.release_profile' "$manifest")" = "$RELEASE_PROFILE"
          jq -e --arg sha "$CANDIDATE_SHA" '.repositories[] | select(.repository == "pcvantol/djconnect-app" and .source_sha == $sha and .version == "3.3.0")' "$manifest" >/dev/null
          binding="$(jq -cer --arg artifact "$ARTIFACT_ID" --arg checksum "$ARTIFACT_SHA256" '.artifact_bindings[] | select(.target == "apple_private_device" and .target_device == "iphone" and .paired_watch_validation == "required" and .artifact_id == $artifact and .artifact_sha256 == $checksum and .signing == "local_developer_provisioning_required")' "$manifest")"
          printf 'artifact_url=%s\n' "$(jq -r '.artifact_url' <<<"$binding")" >> "$GITHUB_OUTPUT"
      - name: Verify exact physical iPhone, paired Watch and local signing scope
        run: |
          set -euo pipefail
          test -n "$IPHONE_UDID" && test -n "$WATCH_UDID" && test -n "$SIGNING_IDENTITY"
          security find-identity -v -p codesigning | grep -F -- "$SIGNING_IDENTITY" >/dev/null
          xcrun devicectl list devices --json-output devices.json >/dev/null
          jq -e --arg udid "$IPHONE_UDID" '[.result.devices[] | select(.hardwareProperties.udid == $udid and .hardwareProperties.deviceType == "iPhone" and .hardwareProperties.reality == "physical" and .deviceProperties.developerModeStatus == "enabled")] | length == 1' devices.json >/dev/null
          jq -e --arg udid "$WATCH_UDID" '[.result.devices[] | select(.hardwareProperties.udid == $udid and .hardwareProperties.deviceType == "appleWatch" and .hardwareProperties.reality == "physical" and .deviceProperties.developerModeStatus == "enabled")] | length == 1' devices.json >/dev/null
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
      - name: Verify, locally sign and install the approved iOS artifact
        env:
          ARTIFACT_URL: ${{ steps.validate.outputs.artifact_url }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location "$ARTIFACT_URL" --output artifact.zip
          test "$(shasum -a 256 artifact.zip | awk '{print $1}')" = "$ARTIFACT_SHA256"
          staging="$(mktemp -d)"
          trap 'rm -rf "$staging"' EXIT
          ditto -x -k artifact.zip "$staging"
          app_bundle="$staging/DJConnect.app"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_bundle/Info.plist")" = dev.djconnect.ios
          Tools/release/resign_internal_ios_bundle.sh "$app_bundle" "$SIGNING_IDENTITY" "$IPHONE_UDID" "$WATCH_UDID"
          xcrun devicectl device install app --device "$IPHONE_UDID" "$app_bundle"
      - name: Publish redacted iPhone deployment evidence
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
        run: |
          python3 - <<'PY'
          import json, os
          json.dump({"kind":"apple_private_iphone_deployment","candidate_sha":os.environ["CANDIDATE_SHA"],"manifest_id":os.environ["MANIFEST_ID"],"artifact_id":os.environ["ARTIFACT_ID"],"artifact_sha256":os.environ["ARTIFACT_SHA256"],"target":"apple_private_device","target_device":"iphone","paired_watch_validation":"required","deployment_result":"DEPLOYED_PENDING_SMOKE"}, open("apple-iphone-deployment-evidence.json", "w"), sort_keys=True)
          PY
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: apple-iphone-deployment-evidence
          path: apple-iphone-deployment-evidence.json
