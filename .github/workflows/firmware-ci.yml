name: Firmware CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-app

  detect:
    name: Detect firmware inputs
    runs-on: ubuntu-latest
    outputs:
      has-platformio: ${{ steps.detect.outputs.has-platformio }}
      has-firmware-metadata: ${{ steps.detect.outputs.has-firmware-metadata }}
      release-version: ${{ steps.detect.outputs.release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Detect PlatformIO and metadata
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f platformio.ini ]]; then
            echo "has-platformio=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-platformio=false" >> "$GITHUB_OUTPUT"
          fi

          metadata_count="$(
            git ls-files \
              'firmware/**/*.json' \
              'firmware/**/manifest*.json' \
              'firmware/**/*metadata*.json' \
              'manifests/**/*.json' \
              '*firmware*manifest*.json' \
              '*firmware*metadata*.json' \
              | wc -l \
              | tr -d ' '
          )"
          if [[ "$metadata_count" -gt 0 ]]; then
            echo "has-firmware-metadata=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-firmware-metadata=false" >> "$GITHUB_OUTPUT"
          fi

          release_version="$(
            awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' project.yml 2>/dev/null || true
          )"
          if [[ -z "$release_version" ]]; then
            release_version="0.0.0"
          fi
          echo "release-version=$release_version" >> "$GITHUB_OUTPUT"

  platformio:
    name: PlatformIO build
    needs: detect
    if: needs.detect.outputs.has-platformio == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build all PlatformIO environments
        run: pio run

  platformio-skip:
    name: PlatformIO build
    needs: detect
    if: needs.detect.outputs.has-platformio != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip PlatformIO build
        run: echo "No platformio.ini found; skipping ESP firmware build."

  firmware-metadata:
    name: Firmware metadata checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Validate firmware metadata and manifests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git ls-files \
              'firmware/**/*.json' \
              'firmware/**/manifest*.json' \
              'firmware/**/*metadata*.json' \
              'manifests/**/*.json' \
              '*firmware*manifest*.json' \
              '*firmware*metadata*.json'
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No tracked firmware metadata or manifest JSON files found."
            exit 0
          fi

          python - "${files[@]}" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          sha256_re = re.compile(r"^[0-9a-fA-F]{64}$")
          failures = []

          def walk(value):
              if isinstance(value, dict):
                  yield value
                  for child in value.values():
                      yield from walk(child)
              elif isinstance(value, list):
                  for child in value:
                      yield from walk(child)

          for raw_path in sys.argv[1:]:
              path = Path(raw_path)
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  failures.append(f"{path}: invalid JSON: {exc}")
                  continue

              for obj in walk(data):
                  asset = obj.get("asset") or obj.get("filename") or obj.get("file")
                  sha256 = obj.get("sha256")
                  if isinstance(asset, str) and asset.endswith((".bin", ".elf", ".zip")):
                      if not isinstance(sha256, str) or not sha256_re.fullmatch(sha256):
                          failures.append(f"{path}: firmware asset {asset!r} must include a 64-character sha256")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          PY

  release-dry-run:
    name: Release script dry-run
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run release dry-run without publishing
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -x ./release.sh ]]; then
            echo "No executable release.sh found; skipping release dry-run."
            exit 0
          fi
          version="$(
            awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' project.yml 2>/dev/null || true
          )"
          if [[ -z "$version" ]]; then
            version="0.0.0"
          fi
          DJCONNECT_SKIP_THIRDPARTY_UPDATE=1 \
            ./release.sh "$version" \
            --dry-run \
            --skip-tests \
            --skip-builds \
            --skip-source-release \
            --no-cleanup
