name: Firmware CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "24 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: firmware-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@04b78708bfed26f96dd6436ad4372a648920110e
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-app

  detect:
    name: Detect C/C++ firmware source
    runs-on: ubuntu-latest
    outputs:
      has-firmware: ${{ steps.detect.outputs.has-firmware }}
      has-platformio: ${{ steps.detect.outputs.has-platformio }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Detect firmware source
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f platformio.ini ]]; then
            echo "has-platformio=true" >> "$GITHUB_OUTPUT"
            echo "has-firmware=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_count="$(
            git ls-files \
              '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hpp' '*.ino' \
              'firmware/**' 'src/**' 'include/**' \
              | wc -l \
              | tr -d ' '
          )"
          if [[ "$source_count" -gt 0 ]]; then
            echo "has-firmware=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-firmware=false" >> "$GITHUB_OUTPUT"
          fi
          echo "has-platformio=false" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze C/C++
    needs: detect
    if: needs.detect.outputs.has-firmware == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: c-cpp

      - name: Set up Python
        if: needs.detect.outputs.has-platformio == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        if: needs.detect.outputs.has-platformio == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio

      - name: Build PlatformIO firmware
        if: needs.detect.outputs.has-platformio == 'true'
        run: pio run

      - name: Autobuild C/C++
        if: needs.detect.outputs.has-platformio != 'true'
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  analyze-skip:
    name: Analyze C/C++
    needs: detect
    if: needs.detect.outputs.has-firmware != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip CodeQL
        run: echo "No tracked C/C++ firmware source found; skipping CodeQL c-cpp analysis."
