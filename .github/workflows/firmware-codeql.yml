name: Firmware CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "24 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: firmware-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect C/C++ firmware source
    runs-on: ubuntu-latest
    outputs:
      has-firmware: ${{ steps.detect.outputs.has-firmware }}
      has-platformio: ${{ steps.detect.outputs.has-platformio }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect firmware source
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f platformio.ini ]]; then
            echo "has-platformio=true" >> "$GITHUB_OUTPUT"
            echo "has-firmware=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_count="$(
            git ls-files \
              '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hpp' '*.ino' \
              'firmware/**' 'src/**' 'include/**' \
              | wc -l \
              | tr -d ' '
          )"
          if [[ "$source_count" -gt 0 ]]; then
            echo "has-firmware=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-firmware=false" >> "$GITHUB_OUTPUT"
          fi
          echo "has-platformio=false" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze C/C++
    needs: detect
    if: needs.detect.outputs.has-firmware == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: Set up Python
        if: needs.detect.outputs.has-platformio == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        if: needs.detect.outputs.has-platformio == 'true'
        run: python -m pip install --upgrade platformio

      - name: Build PlatformIO firmware
        if: needs.detect.outputs.has-platformio == 'true'
        run: pio run

      - name: Autobuild C/C++
        if: needs.detect.outputs.has-platformio != 'true'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  analyze-skip:
    name: Analyze C/C++
    needs: detect
    if: needs.detect.outputs.has-firmware != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip CodeQL
        run: echo "No tracked C/C++ firmware source found; skipping CodeQL c-cpp analysis."
