name: TestFlight beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact app version to upload, for example 3.2.0"
        required: true
      tag:
        description: "Exact source tag to build, for example v3.2.0"
        required: true
      confirm_upload:
        description: "Type UPLOAD_TESTFLIGHT to explicitly allow this beta upload"
        required: true

concurrency:
  group: testflight-beta-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@a73237f907554b2fba16e0e168d5fde22ce75455
    with:
      execution_profile: release
      owner: pcvantol/djconnect-app

  testflight-beta:
    name: Build and upload iOS beta to TestFlight
    runs-on: [self-hosted, internal-release, qualification, apple]
    environment: testflight-beta
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      BUNDLE_ID: dev.djconnect.ios
      SCHEME: DJConnectIOS

    steps:
      - name: Checkout selected source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Validate explicit release intent
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version }}"
          tag="${{ github.event.inputs.tag }}"
          confirm_upload="${{ github.event.inputs.confirm_upload }}"

          if [[ "$confirm_upload" != "UPLOAD_TESTFLIGHT" ]]; then
            echo "Refusing TestFlight upload: confirm_upload must be exactly UPLOAD_TESTFLIGHT." >&2
            exit 64
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $version" >&2
            exit 64
          fi
          if [[ "$tag" != "v$version" ]]; then
            echo "Tag must match version exactly: expected v$version, got $tag" >&2
            exit 64
          fi
          git fetch --tags --force
          git rev-parse --verify "refs/tags/$tag" >/dev/null
          git checkout --detach "$tag"

          project_version="$(
            awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' project.yml
          )"
          if [[ "$project_version" != "$version" ]]; then
            echo "project.yml MARKETING_VERSION ($project_version) does not match requested version ($version)." >&2
            exit 64
          fi

      - name: Validate required secrets
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APP_STORE_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}
          IOS_APP_STORE_PROFILE_NAME: ${{ secrets.IOS_APP_STORE_PROFILE_NAME }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          required=(
            APPLE_TEAM_ID
            IOS_DISTRIBUTION_CERTIFICATE_BASE64
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
            IOS_APP_STORE_PROFILE_BASE64
            IOS_APP_STORE_PROFILE_NAME
            APP_STORE_CONNECT_API_KEY_ID
            APP_STORE_CONNECT_API_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Select Xcode
        run: |
          set -euo pipefail
          echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Prepare signing assets
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APP_STORE_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          RUNNER_TEMP_KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          security create-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" "$RUNNER_TEMP/app-signing.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/app-signing.keychain-db"
          security unlock-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" "$RUNNER_TEMP/app-signing.keychain-db"
          security list-keychains -d user -s "$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/ios-distribution.p12"
          security import "$RUNNER_TEMP/ios-distribution.p12" \
            -k "$RUNNER_TEMP/app-signing.keychain-db" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$RUNNER_TEMP_KEYCHAIN_PASSWORD" \
            "$RUNNER_TEMP/app-signing.keychain-db"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_APP_STORE_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/ios-app-store.mobileprovision"
          profile_uuid="$(
            security cms -D -i "$RUNNER_TEMP/ios-app-store.mobileprovision" \
              | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin
          )"
          cp "$RUNNER_TEMP/ios-app-store.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Validate Apple localizations
        run: python3 scripts/validate_localizations.py

      - name: Swift tests
        run: swift test --no-parallel

      - name: Archive iOS app
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_APP_STORE_PROFILE_NAME: ${{ secrets.IOS_APP_STORE_PROFILE_NAME }}
        run: |
          set -euo pipefail
          rm -rf .testflight
          mkdir -p .testflight
          xcodebuild \
            -project DJConnectApp.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath .testflight/DJConnectIOS.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_APP_STORE_PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            clean archive

      - name: Export IPA
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_APP_STORE_PROFILE_NAME: ${{ secrets.IOS_APP_STORE_PROFILE_NAME }}
        run: |
          set -euo pipefail
          cat > .testflight/ExportOptions-iOS-TestFlight.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${IOS_APP_STORE_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>testFlightInternalTestingOnly</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath .testflight/DJConnectIOS.xcarchive \
            -exportPath .testflight/export \
            -exportOptionsPlist .testflight/ExportOptions-iOS-TestFlight.plist

      - name: Upload to TestFlight
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          ipa_path="$(find .testflight/export -maxdepth 1 -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "No IPA exported." >&2
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload archive artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: testflight-beta-${{ github.event.inputs.tag }}-logs
          path: |
            .testflight/ExportOptions-iOS-TestFlight.plist
            .testflight/DJConnectIOS.xcarchive/dSYMs
          if-no-files-found: ignore
