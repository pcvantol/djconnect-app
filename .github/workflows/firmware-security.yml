name: Firmware security scan

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    uses: pcvantol/djconnect/.github/workflows/djconnect-semgrep-ci.yml@main
    with:
      continue-on-error: true
