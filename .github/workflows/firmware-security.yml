name: Firmware security scan

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-app

  semgrep:
    name: Semgrep
    uses: pcvantol/djconnect/.github/workflows/djconnect-semgrep-ci.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      continue-on-error: true
