name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@5b235069a79f3f650e497a5b64a4bce4aeb1e031
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-app

  test-and-unsigned-build:
    name: CI
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, internal-release, qualification, apple]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Select Xcode
        run: |
          set -euo pipefail
          echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Update third-party packages, dependencies and tools
        run: |
          set -euo pipefail
          Tools/release/update_thirdparty.sh

      - name: Upload third-party update report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: thirdparty-update-report
          path: build/release/thirdparty-update-report.txt
          if-no-files-found: ignore

      - name: Clean local build output
        run: |
          set -euo pipefail
          rm -rf .build .xcode-derived

      - name: Validate Postman collection
        run: |
          set -euo pipefail
          if [[ -f Tools/validate_postman_collection.js && -f docs/postman/djconnect-local-device-api.postman_collection.json ]]; then
            node Tools/validate_postman_collection.js docs/postman/djconnect-local-device-api.postman_collection.json
          else
            echo "Skipping Postman collection validation; no collection validator is present in this repository."
          fi

      - name: WebSocket contract e2e
        run: node Tools/websocket_e2e_contract.js

      - name: HTTP contract e2e
        run: node Tools/http_e2e_contract.js

      - name: HA contract fixture security validation
        run: node Tools/validate_ha_contract_fixture_security.js

      - name: Validate Apple localizations
        run: python3 scripts/validate_localizations.py

      - name: Swift tests
        run: swift test --no-parallel

      - name: macOS unsigned build
        run: |
          xcodebuild \
            -project DJConnectApp.xcodeproj \
            -scheme DJConnectMac \
            -configuration Debug \
            -destination platform=macOS \
            -derivedDataPath .xcode-derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: iOS unsigned build
        run: |
          xcodebuild \
            -project DJConnectApp.xcodeproj \
            -scheme DJConnectIOS \
            -configuration Debug \
            -destination generic/platform=iOS \
            -derivedDataPath .xcode-derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload unsigned Apple build artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: apple-unsigned-build-artifacts
          path: |
            .xcode-derived/Build/Products/Debug/DJConnect.app
            .xcode-derived/Build/Products/Debug-iphoneos/DJConnect.app
          if-no-files-found: error

      - name: Record runner qualification evidence
        if: always()
        env:
          REQUIRED_RUNNER_ROLE: apple
        run: |
          set -euo pipefail
          mkdir -p runner-evidence
          jq -n \
            --arg runner_name "$RUNNER_NAME" \
            --arg runner_os "$RUNNER_OS" \
            --arg runner_arch "$RUNNER_ARCH" \
            --arg required_role "$REQUIRED_RUNNER_ROLE" \
            --arg git_sha "$GITHUB_SHA" \
            --arg xcode "$(xcodebuild -version | tr '\n' ';')" \
            --arg swift "$(swift --version | head -n 1)" \
            '{runner_name:$runner_name,runner_os:$runner_os,runner_arch:$runner_arch,required_role:$required_role,git_sha:$git_sha,xcode:$xcode,swift:$swift}' \
            > runner-evidence/runner-evidence.json

      - name: Upload runner qualification evidence
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: runner-evidence-apple
          path: runner-evidence/runner-evidence.json
          if-no-files-found: error

  cleanup-workflow-runs:
    name: Cleanup old workflow runs
    needs:
      - test-and-unsigned-build
    if: ${{ github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old completed workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          KEEP_RUNS: "2"
        run: |
          set -euo pipefail

          current_workflow_id="$(
            gh api "/repos/${REPO}/actions/runs/${CURRENT_RUN_ID}" --jq '.workflow_id'
          )"

          mapfile -t workflows < <(
            gh api --paginate "/repos/${REPO}/actions/workflows?per_page=100" \
              --jq '.workflows[] | @base64'
          )

          for encoded_workflow in "${workflows[@]}"; do
            workflow="$(
              printf '%s' "$encoded_workflow" | base64 --decode
            )"
            workflow_id="$(jq -r '.id' <<<"$workflow")"
            workflow_name="$(jq -r '.name' <<<"$workflow")"
            keep_limit="$KEEP_RUNS"
            kept=0

            if [[ "$workflow_id" == "$current_workflow_id" ]]; then
              keep_limit=$((KEEP_RUNS - 1))
            fi

            echo "Checking completed runs for ${workflow_name} (${workflow_id})"

            mapfile -t completed_run_ids < <(
              gh api "/repos/${REPO}/actions/workflows/${workflow_id}/runs?status=completed&per_page=100" \
                --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id'
            )

            for run_id in "${completed_run_ids[@]}"; do
              if [[ "$run_id" == "$CURRENT_RUN_ID" ]]; then
                continue
              fi

              kept=$((kept + 1))
              if [[ "$kept" -le "$keep_limit" ]]; then
                continue
              fi

              echo "Deleting completed workflow run ${run_id}"
              gh api --method DELETE "/repos/${REPO}/actions/runs/${run_id}"
            done
          done
