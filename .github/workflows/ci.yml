name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-unsigned-build:
    name: CI
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Update third-party packages, dependencies and tools
        run: |
          set -euo pipefail
          Tools/release/update_thirdparty.sh

      - name: Upload third-party update report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: thirdparty-update-report
          path: build/release/thirdparty-update-report.txt
          if-no-files-found: ignore

      - name: Clean local build output
        run: |
          set -euo pipefail
          rm -rf .build .xcode-derived

      - name: Validate Postman collection
        run: node Tools/validate_postman_collection.js docs/postman/djconnect-local-device-api.postman_collection.json

      - name: Validate Apple localizations
        run: python3 scripts/validate_localizations.py

      - name: Swift tests
        run: swift test --no-parallel

      - name: macOS unsigned build
        run: |
          xcodebuild \
            -project DJConnectApp.xcodeproj \
            -scheme DJConnectMac \
            -configuration Debug \
            -destination platform=macOS \
            -derivedDataPath .xcode-derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: iOS unsigned build
        run: |
          xcodebuild \
            -project DJConnectApp.xcodeproj \
            -scheme DJConnectIOS \
            -configuration Debug \
            -destination generic/platform=iOS \
            -derivedDataPath .xcode-derived \
            CODE_SIGNING_ALLOWED=NO \
            build
